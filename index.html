<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformă Video</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #4a4a4a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #e50914; }
        body { background-color: #121212; color: #f3f4f6; }
        .bg-surface { background-color: #242424; }
        .border-accent { border-color: #e50914; }
        .text-accent { color: #e50914; }
        .bg-accent { background-color: #e50914; }
        .hover-bg-accent:hover { background-color: #b9090b; }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>

    <!-- Citim datele din fișierele tale -->
    <script src="date_conturi.js" onerror="console.warn('date_conturi.js nu a fost găsit.')"></script>
    <script src="date_clipuri.js" onerror="console.warn('date_clipuri.js nu a fost găsit.')"></script>
</head>
<body class="min-h-screen flex flex-col font-sans">

    <div id="toastContainer" class="fixed top-20 right-4 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <header class="bg-surface border-b-[3px] border-accent p-4 sticky top-0 z-40 shadow-lg">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center flex-wrap gap-4">
            <div class="border-2 border-white px-4 py-2 font-black tracking-wider text-xl cursor-pointer" onclick="resetFilters()">
                <span class="text-white">LO</span><span class="text-accent">GO</span>
            </div>

            <nav class="flex items-center gap-2 sm:gap-4 flex-wrap text-sm sm:text-base">
                <button id="btnTagsNav" onclick="toggleTagMenu()" class="border-2 border-gray-500 px-4 py-1 hover:border-accent hover:text-accent transition">Taguri</button>
                
                <button id="btnFavoriteNav" onclick="toggleFavoritesView()" class="hidden border-2 border-gray-500 px-4 py-1 hover:border-accent hover:text-accent transition">Favorite</button>

                <div id="authButtons" class="flex gap-2">
                    <button onclick="openModal('loginModal')" class="border-2 border-white px-4 py-1 text-white hover:border-accent hover:text-accent transition">Login</button>
                </div>
                
                <div id="userProfile" class="hidden items-center gap-4">
                    <span id="userNameDisplay" class="text-accent font-bold text-sm"></span>
                    <button onclick="logout()" class="border border-gray-600 px-3 py-1 text-xs hover:border-white transition">Ieși</button>
                </div>
            </nav>
        </div>
    </header>

    <!-- Bara de Taguri Ascunsă (Apare când apeși pe Taguri) -->
    <div id="tagMenu" class="hidden w-full bg-[#1a1a1a] border-b border-gray-800 p-4 shadow-inner">
        <div class="max-w-[1600px] mx-auto flex flex-wrap gap-2 items-center" id="tagsContainerUI">
            <!-- Tagurile se vor genera aici -->
        </div>
    </div>

    <div class="flex flex-1 max-w-[1600px] mx-auto w-full">
        <aside class="w-full md:w-64 p-4 border-r-2 border-gray-800 flex-shrink-0 hidden md:flex flex-col gap-6">
            <div class="border-2 border-white p-1 flex">
                <!-- Am adăugat oninput pentru a căuta instantaneu -->
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Caută videoclip..." class="bg-transparent w-full px-2 outline-none text-white placeholder-gray-500">
            </div>
            <div class="border-2 border-gray-600 p-4 h-64 overflow-y-auto">
                <h3 class="text-sm text-gray-400 uppercase tracking-widest mb-4">Rezultate Noi</h3>
                <ul class="space-y-3" id="latestVideosList"></ul>
            </div>
            <div class="border-2 border-gray-600 p-4 h-64 overflow-y-auto">
                <h3 class="text-sm text-gray-400 uppercase tracking-widest mb-4">Top Vizionări</h3>
                <ul class="space-y-3" id="mostPlayedList"></ul>
            </div>
        </aside>

        <main class="flex-1 p-4 md:p-8">
            <div id="videoGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </main>
    </div>

    <!-- MODAL LOGIN -->
    <div id="loginModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-surface border-2 border-accent p-6 w-full max-w-sm mx-4">
            <h2 class="text-xl font-bold mb-4 text-white">Conectare</h2>
            <input type="text" id="logUser" placeholder="Nume utilizator" class="w-full mb-3 bg-[#121212] border border-gray-600 p-2 text-white outline-none focus:border-accent">
            <input type="password" id="logPass" placeholder="Parolă" class="w-full mb-4 bg-[#121212] border border-gray-600 p-2 text-white outline-none focus:border-accent">
            <div class="flex justify-end gap-2">
                <button onclick="closeModal('loginModal')" class="px-4 py-2 text-sm border border-gray-500 hover:bg-gray-800 text-white">Anulează</button>
                <button onclick="handleLogin()" class="px-4 py-2 text-sm bg-accent text-white hover-bg-accent">Intră</button>
            </div>
        </div>
    </div>

    <script>
        // Funcții Utilitare Modal
        window.openModal = (id) => { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); };
        window.closeModal = (id) => { 
            document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); 
            if(id === 'loginModal') { document.getElementById('logUser').value = ''; document.getElementById('logPass').value = ''; }
        };

        window.showNotification = (msg, err = false) => {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast-enter p-4 border-l-4 shadow-lg flex items-center gap-3 ${err ? 'bg-red-900 border-red-500 text-white' : 'bg-gray-800 border-accent text-white'}`;
            toast.innerHTML = `<div class="font-medium text-sm">${msg}</div>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        };

        // Autentificare
        window.updateAuthUI = () => {
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                document.getElementById('authButtons').classList.add('hidden');
                document.getElementById('userProfile').classList.remove('hidden');
                document.getElementById('userProfile').classList.add('flex');
                document.getElementById('userNameDisplay').innerText = "@" + currentUser;
                document.getElementById('btnFavoriteNav').classList.remove('hidden');
            } else {
                document.getElementById('authButtons').classList.remove('hidden');
                document.getElementById('userProfile').classList.add('hidden');
                document.getElementById('userProfile').classList.remove('flex');
                document.getElementById('btnFavoriteNav').classList.add('hidden');
                if(showingFavorites) toggleFavoritesView();
            }
        };

        window.handleLogin = () => {
            const user = document.getElementById('logUser').value.trim();
            const pass = document.getElementById('logPass').value.trim();
            const allUsers = typeof usersData !== 'undefined' ? usersData : (window.usersData || []);
            const foundUser = allUsers.find(u => u.username === user && u.parola === pass);
            
            if(foundUser) {
                localStorage.setItem('currentUser', foundUser.username);
                window.updateAuthUI();
                window.closeModal('loginModal');
                window.showNotification("Te-ai conectat ca " + foundUser.username);
            } else {
                window.showNotification("Date incorecte!", true);
            }
        };

        window.logout = () => {
            localStorage.removeItem('currentUser');
            window.updateAuthUI();
            window.showNotification("Deconectat.");
        };

        // Filtre Globale
        let showingFavorites = false;
        let currentSearchText = "";
        let currentSelectedTag = "";
        let showingTagMenu = false;

        // Resetare Filtre (Când dai click pe Logo)
        window.resetFilters = () => {
            document.getElementById('searchInput').value = '';
            currentSearchText = "";
            currentSelectedTag = "";
            showingFavorites = false;
            
            document.getElementById('btnFavoriteNav').className = "border-2 border-gray-500 px-4 py-1 hover:border-accent hover:text-accent transition";
            
            renderTagsUI();
            renderVideos();
        };

        window.toggleFavoritesView = () => {
            showingFavorites = !showingFavorites;
            const btn = document.getElementById('btnFavoriteNav');
            showingFavorites ? btn.className = "bg-accent text-white border-2 border-accent px-4 py-1" : btn.className = "border-2 border-gray-500 px-4 py-1 hover:border-accent hover:text-accent transition";
            renderVideos();
        };

        window.handleSearch = () => {
            currentSearchText = document.getElementById('searchInput').value.toLowerCase();
            renderVideos();
        };

        window.toggleTagMenu = () => {
            showingTagMenu = !showingTagMenu;
            const menu = document.getElementById('tagMenu');
            const btn = document.getElementById('btnTagsNav');
            
            if(showingTagMenu) {
                menu.classList.remove('hidden');
                btn.classList.add('bg-gray-800', 'border-white', 'text-white');
                renderTagsUI();
            } else {
                menu.classList.add('hidden');
                btn.classList.remove('bg-gray-800', 'border-white', 'text-white');
            }
        };

        window.selectTag = (tag) => {
            if(currentSelectedTag === tag) {
                currentSelectedTag = ""; // Dacă apeși pe tagul deja activ, se deselectează
            } else {
                currentSelectedTag = tag;
                // Dacă meniul e ascuns și am apăsat de pe un videoclip, deschidem meniul
                if(!showingTagMenu) toggleTagMenu(); 
            }
            renderTagsUI();
            renderVideos();
        };

        // Funcție care desenează butoanele cu taguri sus
        function renderTagsUI() {
            const container = document.getElementById('tagsContainerUI');
            if(!container) return;

            // Extragem toate tagurile unice din clipuri
            let data = typeof videosData !== 'undefined' ? videosData : (window.videosData || []);
            const allTags = new Set();
            data.forEach(v => {
                if(v.taguri) Object.values(v.taguri).forEach(t => allTags.add(t.toLowerCase().trim()));
            });

            // Butonul de Resetare
            container.innerHTML = `<button onclick="selectTag('')" class="text-xs px-3 py-1 border transition ${currentSelectedTag === '' ? 'border-accent bg-accent text-white' : 'border-gray-600 text-gray-300 hover:border-white'}">TOATE</button>`;

            // Randăm restul tagurilor
            allTags.forEach(tag => {
                const isActive = currentSelectedTag === tag;
                container.innerHTML += `<button onclick="selectTag('${tag}')" class="text-xs px-3 py-1 border transition uppercase tracking-wider ${isActive ? 'border-accent bg-accent text-white font-bold' : 'border-gray-600 text-gray-300 hover:border-white'}">#${tag}</button>`;
            });
        }

        // Randare Videoclipuri și Aplicare Filtre
        function renderVideos() {
            const grid = document.getElementById('videoGrid');
            const latList = document.getElementById('latestVideosList');
            const mpList = document.getElementById('mostPlayedList');
            grid.innerHTML = ''; latList.innerHTML = ''; mpList.innerHTML = '';

            let data = typeof videosData !== 'undefined' ? videosData : (window.videosData || []);
            if(data.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-500">Nu există clipuri momentan.</div>`;
                return;
            }

            // Pregătim datele adăugând ID-ul original
            let filteredVideos = data.map((v, i) => ({ ...v, id: i }));

            // 1. Filtru FAVORITE
            if (showingFavorites) {
                const currentUser = localStorage.getItem('currentUser');
                let allFavs = JSON.parse(localStorage.getItem('userFavorites')) || {};
                let userFavs = allFavs[currentUser] || [];
                filteredVideos = filteredVideos.filter(v => userFavs.includes(v.id));
            }

            // 2. Filtru SEARCH BARA
            if (currentSearchText !== "") {
                filteredVideos = filteredVideos.filter(v => 
                    v.titlu.toLowerCase().includes(currentSearchText) || 
                    (v.autor && v.autor.toLowerCase().includes(currentSearchText))
                );
            }

            // 3. Filtru TAG-URI
            if (currentSelectedTag !== "") {
                filteredVideos = filteredVideos.filter(v => 
                    v.taguri && v.taguri.some(t => t.toLowerCase().trim() === currentSelectedTag)
                );
            }

            // Verificăm dacă mai avem clipuri după filtrare
            if(filteredVideos.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-10 text-gray-500 text-lg">Nu am găsit niciun rezultat conform filtrelor tale.</div>`;
                return;
            }

            // Sortăm rezultatele finale de la nou la vechi
            const sortedVideos = [...filteredVideos].sort((a, b) => new Date(b.data) - new Date(a.data));

            sortedVideos.forEach(video => {
                const card = document.createElement('div');
                card.className = "flex flex-col gap-2 bg-[#1a1a1a] p-2 border border-gray-800 hover:border-accent transition duration-300";
                
                // Generăm tagurile ca fiind butoane clicabile direct de pe video!
                const tagsHtml = video.taguri ? video.taguri.map(tag => 
                    `<button onclick="selectTag('${tag.toLowerCase().trim()}')" class="bg-gray-800 text-gray-300 hover:bg-gray-600 hover:text-white transition text-[10px] px-2 py-0.5 border border-gray-600 uppercase">#${tag}</button>`
                ).join('') : '';

                card.innerHTML = `
                    <a href="clip.html?id=${video.id}" class="w-full aspect-video bg-black flex items-center justify-center relative overflow-hidden group border-b border-gray-800">
                        <video src="${video.link}#t=1" class="w-full h-full object-cover group-hover:scale-105 transition duration-500 pointer-events-none" preload="metadata" muted playsinline></video>
                        <div class="absolute inset-0 bg-black/30 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-300">
                            <svg class="w-14 h-14 text-accent drop-shadow-[0_0_10px_rgba(229,9,20,0.8)]" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4l12 6-12 6z"></path></svg>
                        </div>
                    </a>
                    <div class="flex flex-col pt-1">
                        <h4 class="text-md font-bold text-white truncate"><a href="clip.html?id=${video.id}" class="hover:text-accent">${video.titlu}</a></h4>
                        <div class="flex justify-between items-center mt-1 text-xs text-gray-500">
                            <span>${video.data}</span>
                            <span class="text-[10px] text-gray-400 bg-gray-800 px-1 border border-gray-600">@${video.autor}</span>
                        </div>
                        <div class="flex flex-wrap gap-1 mt-3">${tagsHtml}</div>
                    </div>`;
                grid.appendChild(card);
            });

            // Meniurile laterale (Folosesc și ele rezultatele filtrate acum!)
            sortedVideos.slice(0, 8).forEach(v => {
                latList.innerHTML += `<li class="text-sm border-b border-gray-800 pb-2"><a href="clip.html?id=${v.id}" class="text-gray-300 hover:text-accent">${v.titlu}</a><br><span class="text-[10px] text-gray-500">${v.data}</span></li>`;
            });
            sortedVideos.slice(0, 4).forEach((v, idx) => {
                mpList.innerHTML += `<li class="text-sm"><a href="clip.html?id=${v.id}" class="text-gray-300 hover:text-accent">${idx+1}. ${v.titlu}</a></li>`;
            });
        }

        // Pornim aplicația și pregătim meniurile
        window.addEventListener('DOMContentLoaded', () => { 
            window.updateAuthUI(); 
            renderTagsUI();
            renderVideos(); 
        });
    </script>
</body>
</html>
