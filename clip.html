<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizionare Video</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #4a4a4a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #e50914; }
        
        body { background-color: #121212; color: #f3f4f6; }
        .bg-surface { background-color: #242424; }
        .border-accent { border-color: #e50914; }
        .text-accent { color: #e50914; }
        .bg-accent { background-color: #e50914; }
        .hover-bg-accent:hover { background-color: #b9090b; }
    </style>

    <!-- Încărcăm baza de date pentru a citi datele clipului selectat -->
    <script>window.videosData = [];</script>
    <script src="date_clipuri.js"></script>
</head>
<body class="min-h-screen flex flex-col font-sans">

    <!-- BARA DE NAVIGAȚIE -->
    <header class="bg-surface border-b-[3px] border-accent p-4 sticky top-0 z-40 shadow-lg">
        <div class="max-w-[1200px] mx-auto flex justify-between items-center flex-wrap gap-4">
            <!-- Buton înapoi + Logo -->
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-gray-400 hover:text-white transition flex items-center gap-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Acasă
                </a>
                <div class="border-2 border-white px-3 py-1 font-black tracking-wider text-lg cursor-default">
                    <span class="text-white">LO</span><span class="text-accent">GO</span>
                </div>
            </div>

            <!-- Profil / Autentificare vizuală -->
            <div id="userProfile" class="flex items-center gap-4">
                <span id="userNameDisplay" class="text-gray-400 text-sm"></span>
            </div>
        </div>
    </header>

    <!-- CONȚINUTUL PRINCIPAL -->
    <main class="flex-1 w-full max-w-[1200px] mx-auto p-4 md:p-8">
        
        <!-- Player-ul Video -->
        <div class="w-full bg-black aspect-video border-2 border-gray-800 shadow-[0_0_15px_rgba(0,0,0,0.5)]">
            <video id="videoPlayer" controls class="w-full h-full" preload="metadata">
                <source id="videoSource" src="" type="video/mp4">
                Browserul tău nu suportă redarea.
            </video>
        </div>

        <!-- Informații sub Video -->
        <div class="mt-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-gray-800 pb-6">
            <div class="flex-1">
                <h1 id="videoTitle" class="text-2xl font-bold text-white mb-2">Se încarcă...</h1>
                <div class="flex items-center gap-3 text-sm text-gray-400 font-mono">
                    <span id="videoDate" class="flex items-center gap-1"></span>
                    <span>•</span>
                    <span id="videoAuthor" class="bg-gray-800 px-2 rounded border border-gray-600 text-gray-300"></span>
                </div>
            </div>

            <!-- Buton Favorite -->
            <button id="btnFavorite" onclick="toggleFavorite()" class="hidden border-2 border-gray-500 px-4 py-2 hover:border-accent hover:text-accent transition flex items-center gap-2">
                <svg id="favIconEmpty" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                <svg id="favIconFilled" class="w-5 h-5 text-accent hidden" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"></path></svg>
                <span id="favText">Adaugă la Favorite</span>
            </button>
        </div>

        <!-- Secțiunea Taguri -->
        <div class="mt-4">
            <h3 class="text-gray-500 text-sm mb-2 uppercase tracking-wide">Taguri:</h3>
            <div id="videoTags" class="flex flex-wrap gap-2">
                <!-- Tagurile se adaugă aici din JS -->
            </div>
        </div>

    </main>

    <!-- LOGICA JS -->
    <script>
        // 1. Verificăm ID-ul videoclipului din adresa site-ului (ex: clip.html?id=0)
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = parseInt(urlParams.get('id'));
        
        const currentUser = localStorage.getItem('currentUser');
        
        // Dacă utilizatorul e logat, îi afișăm numele în dreapta sus
        if(currentUser) {
            document.getElementById('userNameDisplay').innerText = "@" + currentUser;
            document.getElementById('btnFavorite').classList.remove('hidden'); // Arătăm butonul de Favorite
        } else {
            document.getElementById('userNameDisplay').innerText = "Vizitator (Nelogat)";
        }

        // 2. Extragem datele din fisierul js și populăm ecranul
        if (typeof videosData !== 'undefined' && !isNaN(videoId) && videosData[videoId]) {
            const video = videosData[videoId];
            
            // Setăm linkul pentru player și forțăm reîncărcarea lui
            const player = document.getElementById('videoPlayer');
            document.getElementById('videoSource').src = video.link;
            player.load();

            // Populăm detaliile
            document.getElementById('videoTitle').innerText = video.titlu;
            document.getElementById('videoDate').innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg> ${video.data}`;
            document.getElementById('videoAuthor').innerText = "@" + (video.autor || "anonim");

            // Generăm tagurile
            const tagsContainer = document.getElementById('videoTags');
            if(video.taguri && video.taguri.length > 0) {
                video.taguri.forEach(tag => {
                    const span = document.createElement('span');
                    span.className = "bg-gray-800 text-gray-300 text-xs px-3 py-1 border border-gray-600 uppercase tracking-wider";
                    span.innerText = "#" + tag;
                    tagsContainer.appendChild(span);
                });
            } else {
                tagsContainer.innerHTML = '<span class="text-xs text-gray-600 italic">Nu există taguri pentru acest clip.</span>';
            }

            // 3. Setarea inițială a butonului Favorite
            checkFavoriteStatus();
        } else {
            document.getElementById('videoTitle').innerText = "Videoclipul nu a fost găsit.";
            document.getElementById('videoTitle').className = "text-2xl font-bold text-red-500 mb-2";
        }

        // ==========================================
        // SISTEM SALVARE FAVORITE (LocalStorage)
        // ==========================================
        
        function checkFavoriteStatus() {
            if(!currentUser) return;
            
            let allFavs = JSON.parse(localStorage.getItem('userFavorites')) || {};
            let userFavs = allFavs[currentUser] || [];
            
            const btn = document.getElementById('btnFavorite');
            const iconEmpty = document.getElementById('favIconEmpty');
            const iconFilled = document.getElementById('favIconFilled');
            const favText = document.getElementById('favText');

            if(userFavs.includes(videoId)) {
                // Este în favorite
                btn.className = "border-2 border-accent text-accent px-4 py-2 flex items-center gap-2 bg-[#2a1215]";
                iconEmpty.classList.add('hidden');
                iconFilled.classList.remove('hidden');
                favText.innerText = "Salvat la Favorite";
            } else {
                // Nu este în favorite
                btn.className = "border-2 border-gray-500 px-4 py-2 hover:border-accent hover:text-accent transition flex items-center gap-2";
                iconEmpty.classList.remove('hidden');
                iconFilled.classList.add('hidden');
                favText.innerText = "Adaugă la Favorite";
            }
        }

        function toggleFavorite() {
            if(!currentUser) return; // N-ar trebui să poată apăsa dacă nu e logat

            let allFavs = JSON.parse(localStorage.getItem('userFavorites')) || {};
            let userFavs = allFavs[currentUser] || [];

            // Dacă este deja adăugat, îl scoatem, altfel îl adăugăm
            if(userFavs.includes(videoId)) {
                userFavs = userFavs.filter(id => id !== videoId);
            } else {
                userFavs.push(videoId);
            }

            // Salvăm din nou în memoria browserului profilului actual
            allFavs[currentUser] = userFavs;
            localStorage.setItem('userFavorites', JSON.stringify(allFavs));

            // Actualizăm aspectul butonului
            checkFavoriteStatus();
        }
    </script>
</body>
</html>
